# Lychee link checker configuration for hed-schemas

# Exclude patterns
exclude = [
    # Exclude localhost and local file links
    '^http://127\.0\.0\.',
    '^http://localhost',
    '^https://localhost',
    '^file://',
    
    # Exclude common false positives
    'https://github.com/.*/settings/*',
    'https://github.com/.*/edit/*',
    
    # Exclude dynamic URLs that may not work in CI
    'https://www.hedtags.org/hed-schema-browser*',

    # Exclude Furo "View source" links (GitHub blob URLs with ?plain=true)
    # These break when source_branch is "main" but files only exist in a feature branch
    'https://github\.com/hed-standard/hed-schemas/blob/.*\?plain=true',

    # Exclude DOI links that frequently timeout
    'https://doi\.org/10\.5281/zenodo\.7876037',
    'https://doi\.org/10\.5281/zenodo\.7897596',
    'https://doi\.org/10\.5281/zenodo\.13987483',
]

# Accept status codes
accept = [
    200,    # OK
    204,    # No Content
    206,    # Partial Content (for range requests)
    429,    # Too Many Requests (rate limiting)
    999,    # Some sites use this instead of 429
]

# Retry settings
max_retries = 3
retry_wait_time = 2

# Timeout settings
timeout = 20

# Headers to send with requests
header = { Accept = "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8", User-Agent = "Mozilla/5.0 (compatible; Lychee/1.0)" }

# Follow redirects
max_redirects = 10

# Check links in markdown files
include_verbatim = false

# Cache results for better performance
cache = true
