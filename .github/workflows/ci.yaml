# Continuous integration: run the Python unit tests for the manifest scripts (scripts/ + tests/).
# Move to .github/workflows/ci.yaml.
name: CI

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.10"
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
