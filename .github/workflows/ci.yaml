# Continuous integration: run the Python unit tests for the manifest scripts (scripts/ + tests/).
# Move to .github/workflows/ci.yaml.
name: CI

on:
  push:
    paths:
      - "scripts/**"
      - "tests/**"
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unittest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.10"
      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py" -v
